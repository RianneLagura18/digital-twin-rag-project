<!DOCTYPE html>
<html>
<head>
  <title>Gym Chatbot</title>
</head>

<body>

<h2>🏋️ Gym Fitness Chatbot</h2>

<input type="text" id="input" placeholder="Ask something..." />
<button onclick="send()">Send</button>

<p id="response"></p>

<script>
async function send() {
  const input = document.getElementById("input").value;
  const responseEl = document.getElementById("response");

  responseEl.innerText = "Thinking...";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ message: input }),
    });

    const data = await res.json();

    if (data.reply) {
      responseEl.innerText = data.reply;
    } else {
      responseEl.innerText = JSON.stringify(data);
    }

  } catch (err) {
    responseEl.innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
