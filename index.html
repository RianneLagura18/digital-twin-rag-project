<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fitness Chatbot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 420px;
  height: 650px;
  background: #0f172a;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.header {
  background: #020617;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  padding: 12px 14px;
  border-radius: 12px;
  max-width: 75%;
  font-size: 14px;
  line-height: 1.4;
}

.user {
  background: #2563eb;
  color: white;
  align-self: flex-end;
}

.bot {
  background: #1e293b;
  color: #e2e8f0;
  align-self: flex-start;
}

.input-area {
  display: flex;
  padding: 10px;
  background: #020617;
  border-top: 1px solid #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

button {
  margin-left: 8px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

</style>
</head>

<body>

<div class="chat-container">
  <div class="header">💪 Fitness Chatbot</div>

  <div id="messages" class="messages"></div>

  <div id="resultBox" style="padding:10px; color:white;"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask about workouts..." />
    <button id="sendBtn">Send</button>
  </div>

  <div style="padding:10px;">
    <button onclick="quickAsk('beginner workout')">Beginner Workout</button>
    <button onclick="quickAsk('weight loss tips')">Weight Loss</button>
    <button onclick="quickAsk('abs workout')">Abs</button>
  </div>
</div>

<script>

let isSending = false;

document.getElementById("sendBtn").addEventListener("click", send);

document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    send();
  }
});

function addMessage(text, sender) {
  const messages = document.getElementById("messages");

  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerHTML = text;

  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function quickAsk(text) {
  document.getElementById("input").value = text;
  send();
}

async function send() {
  if (isSending) return;
  isSending = true;

  const inputBox = document.getElementById("input");
  const text = inputBox.value.trim();

  if (!text) {
    addMessage("⚠️ Please enter a question", "bot");
    isSending = false;
    return;
  }

  addMessage(text, "user");
  inputBox.value = "";

  // loading
  const loadingMsg = document.createElement("div");
  loadingMsg.classList.add("message", "bot");
  loadingMsg.innerText = "⏳ Thinking...";
  document.getElementById("messages").appendChild(loadingMsg);

  try {
    const res = await fetch("https://prison-seltzer-unwashed.ngrok-free.dev/api/interview", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "ngrok-skip-browser-warning": "true"
      },
      body: JSON.stringify({ question: text }),
    });

    const data = await res.json();

    // remove loading
    loadingMsg.remove();

    let botReply = data.answer || data.result || data.message || "No response";

    // clean output
    if (botReply.includes("Final Answer:")) {
      botReply = botReply.split("Final Answer:")[1].trim();
    }

    if (!botReply || botReply === "No response") {
      botReply = "⚠️ No answer found. Try another question.";
    }

    addMessage(`<b>💬 Answer:</b><br><br>${botReply}`, "bot");

    // score + recommendation
    if (data.score || data.recommendation) {
      document.getElementById("resultBox").innerHTML = `
        <div style="background:#1e293b; padding:10px; border-radius:10px;">
          📊 <b>Score:</b> ${data.score || "N/A"} <br>
          💡 <b>Recommendation:</b> ${data.recommendation || "Keep going!"}
        </div>
      `;
    }

  } catch (err) {
    console.error(err);
    addMessage("❌ Error connecting to server", "bot");
  }

  isSending = false;
}

</script>

</body>
</html>
